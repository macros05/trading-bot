<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0F172A;
    --surface:   #1E293B;
    --border:    #334155;
    --text:      #94A3B8;
    --text-hi:   #E2E8F0;
    --green:     #22C55E;
    --yellow:    #FBBF24;
    --red:       #EF4444;
    --blue:      #38BDF8;
    --gray:      #475569;
    --font-mono: 'Courier New', Courier, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── shared card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card-title {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 12px;
  }

  /* ── TOP PANEL ── */
  #top {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: .08em;
  }
  .badge-green  { background: rgba(34,197,94,.15);  color: var(--green);  border: 1px solid rgba(34,197,94,.4); }
  .badge-yellow { background: rgba(251,191,36,.15); color: var(--yellow); border: 1px solid rgba(251,191,36,.4); }
  .badge-red    { background: rgba(239,68,68,.15);  color: var(--red);    border: 1px solid rgba(239,68,68,.4); }
  .badge-gray   { background: rgba(71,85,105,.2);   color: var(--gray);   border: 1px solid rgba(71,85,105,.4); }

  #state-value   { font-size: 18px; margin-top: 6px; color: var(--text-hi); }
  #symbol-value  { font-size: 22px; color: var(--blue); margin-top: 4px; }
  #tf-value      { font-size: 13px; color: var(--gray); margin-top: 2px; }
  #conn-dot      { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  #conn-label    { font-size: 12px; }
  #last-seen     { font-size: 11px; color: var(--gray); margin-top: 4px; }

  /* ── MIDDLE ROW ── */
  #middle {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
  }

  /* metrics */
  #metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .metric-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--gray); }
  .metric-value { font-size: 28px; color: var(--text-hi); margin: 6px 0 4px; letter-spacing: -.02em; }
  .metric-sub   { font-size: 11px; color: var(--gray); }

  .arrow-up   { color: var(--green); }
  .arrow-down { color: var(--red); }

  /* RSI bar */
  .rsi-track {
    height: 6px; background: var(--border); border-radius: 3px;
    margin-top: 8px; overflow: hidden;
  }
  .rsi-fill {
    height: 100%; border-radius: 3px;
    transition: width .4s ease, background .4s ease;
  }
  .rsi-zones {
    display: flex; justify-content: space-between;
    font-size: 9px; color: var(--gray); margin-top: 3px;
  }

  /* signals */
  #signals-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 240px;
    overflow-y: auto;
  }
  .signal-item {
    background: rgba(34,197,94,.06);
    border: 1px solid rgba(34,197,94,.2);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 11px;
    line-height: 1.6;
  }
  .signal-ts    { color: var(--gray); font-size: 10px; }
  .signal-price { color: var(--green); font-weight: bold; }
  .signal-rsi   { color: var(--blue); }
  #no-signals   { color: var(--gray); font-size: 12px; padding: 12px 0; }

  /* ── LOG PANEL ── */
  #log-container {
    height: 240px;
    overflow-y: auto;
    background: #080F1C;
    border-radius: 4px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .log-line {
    font-size: 11px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-info    { color: var(--text); }
  .log-warning { color: var(--yellow); }
  .log-error   { color: var(--red); }
  .log-debug   { color: var(--gray); }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* header */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 4px;
  }
  #header h1 { font-size: 14px; color: var(--blue); letter-spacing: .1em; }
  #refresh-label { font-size: 10px; color: var(--gray); }
</style>
</head>
<body>

<div id="header">
  <h1>⬡ TRADING BOT MONITOR</h1>
  <span id="refresh-label">Refreshing every 5s</span>
</div>

<!-- TOP: state / symbol / connection -->
<div id="top">
  <div class="card">
    <div class="card-title">Bot State</div>
    <div><span id="state-badge" class="badge badge-gray">—</span></div>
    <div id="state-value">—</div>
  </div>
  <div class="card">
    <div class="card-title">Market</div>
    <div id="symbol-value">—</div>
    <div id="tf-value">timeframe: —</div>
  </div>
  <div class="card">
    <div class="card-title">Connection</div>
    <span id="conn-dot" style="background:var(--gray)"></span>
    <span id="conn-label">—</span>
    <div id="last-seen">last tick: —</div>
  </div>
</div>

<!-- MIDDLE: metrics + signals -->
<div id="middle">
  <div class="card">
    <div class="card-title">Last Candle Metrics</div>
    <div id="metrics-grid">

      <div>
        <div class="metric-label">Close</div>
        <div class="metric-value" id="m-close">—</div>
        <div class="metric-sub">USDT</div>
      </div>

      <div>
        <div class="metric-label">SMA 20 <span id="sma-arrow"></span></div>
        <div class="metric-value" id="m-sma">—</div>
        <div class="metric-sub" id="sma-sub">—</div>
      </div>

      <div>
        <div class="metric-label">RSI 14</div>
        <div class="metric-value" id="m-rsi">—</div>
        <div class="rsi-track"><div class="rsi-fill" id="rsi-fill" style="width:0%"></div></div>
        <div class="rsi-zones"><span>0</span><span style="color:var(--green)">30</span><span>50</span><span style="color:var(--red)">70</span><span>100</span></div>
      </div>

    </div>
  </div>

  <div class="card">
    <div class="card-title">Buy Signals</div>
    <ul id="signals-list"><li id="no-signals">No signals detected yet</li></ul>
  </div>
</div>

<!-- BOTTOM: live log -->
<div class="card">
  <div class="card-title">Live Log — last 20 lines</div>
  <div id="log-container"></div>
</div>

<script>
const LOG_URL      = 'bot.log';
const POLL_MS      = 5000;
const STALE_MS     = 2 * 60 * 1000;   // 2 minutes

// ── regex ──────────────────────────────────────────────────────────────────
const RE_TICK   = /tick\s+symbol=(\S+)\s+close=([\d.]+)\s+sma\d+=([.\d]+)\s+rsi\d+=([\d.]+)\s+state=(\S+)/;
const RE_SIGNAL = /buy_signal\s+symbol=(\S+)\s+close=([\d.]+)\s+sma\d+=[.\d]+\s+rsi\d+=([\d.]+)/;
const RE_TS     = /^(\d{4}-\d{2}-\d{2}\s[\d:,]+)/;
const RE_LEVEL  = /\s(INFO|WARNING|ERROR|DEBUG)\s/;

// ── state ──────────────────────────────────────────────────────────────────
let lastTickMs  = null;
let signals     = [];

// ── helpers ───────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function fmtPrice(v) {
  return Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function timeSince(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60)  return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s ago`;
  return `${Math.floor(s/3600)}h ago`;
}

// ── render state badge ─────────────────────────────────────────────────────
function renderState(state) {
  const badge = el('state-badge');
  const label = el('state-value');
  const map = {
    WAITING_SIGNAL:  ['badge-green',  'WAITING SIGNAL'],
    IN_POSITION:     ['badge-yellow', 'IN POSITION'],
    ORDER_PENDING:   ['badge-yellow', 'ORDER PENDING'],
    ERROR_COOLDOWN:  ['badge-red',    'ERROR COOLDOWN'],
  };
  const [cls, text] = map[state] || ['badge-gray', state];
  badge.className = `badge ${cls}`;
  badge.textContent = text;
  label.textContent = state;
}

// ── render metrics ─────────────────────────────────────────────────────────
function renderMetrics(close, sma, rsi, state, symbol) {
  el('m-close').textContent = fmtPrice(close);
  el('m-sma').textContent   = fmtPrice(sma);
  el('m-rsi').textContent   = Number(rsi).toFixed(1);

  // SMA arrow
  const arrow = el('sma-arrow');
  if (close > sma) {
    arrow.textContent = '↑';
    arrow.className   = 'arrow-up';
    el('sma-sub').textContent = 'close above SMA';
    el('sma-sub').style.color = 'var(--green)';
  } else {
    arrow.textContent = '↓';
    arrow.className   = 'arrow-down';
    el('sma-sub').textContent = 'close below SMA';
    el('sma-sub').style.color = 'var(--red)';
  }

  // RSI bar
  const pct  = Math.min(100, Math.max(0, (rsi / 100) * 100));
  const fill = el('rsi-fill');
  fill.style.width = `${pct}%`;
  if (rsi < 30)      { fill.style.background = 'var(--green)'; }
  else if (rsi > 70) { fill.style.background = 'var(--red)'; }
  else               { fill.style.background = 'var(--gray)'; }

  // symbol / state
  const parts = symbol.split('/');
  el('symbol-value').textContent = symbol;
  renderState(state);
}

// ── render signals ─────────────────────────────────────────────────────────
function renderSignals() {
  const list = el('signals-list');
  if (signals.length === 0) {
    list.innerHTML = '<li id="no-signals">No signals detected yet</li>';
    return;
  }
  list.innerHTML = signals.slice(-10).reverse().map(s =>
    `<li class="signal-item">
      <div class="signal-ts">${s.ts}</div>
      <div>
        <span class="signal-price">${fmtPrice(s.close)}</span> USDT &nbsp;
        RSI <span class="signal-rsi">${Number(s.rsi).toFixed(1)}</span>
      </div>
    </li>`
  ).join('');
}

// ── render log ─────────────────────────────────────────────────────────────
function renderLog(lines) {
  const container = el('log-container');
  const last20    = lines.filter(l => l.trim()).slice(-20);
  container.innerHTML = last20.map(line => {
    const levelMatch = line.match(RE_LEVEL);
    const level = levelMatch ? levelMatch[1] : 'INFO';
    const cls = {
      WARNING: 'log-warning',
      ERROR:   'log-error',
      DEBUG:   'log-debug',
    }[level] || 'log-info';
    const safe = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="log-line ${cls}">${safe}</div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

// ── connection indicator ───────────────────────────────────────────────────
function renderConnection() {
  const dot   = el('conn-dot');
  const label = el('conn-label');
  const seen  = el('last-seen');

  if (!lastTickMs) {
    dot.style.background   = 'var(--gray)';
    label.textContent      = 'No data yet';
    seen.textContent       = 'last tick: —';
    return;
  }

  const age  = Date.now() - lastTickMs;
  const live = age < STALE_MS;
  dot.style.background  = live ? 'var(--green)' : 'var(--red)';
  label.textContent     = live ? 'Live' : 'Stale';
  label.style.color     = live ? 'var(--green)' : 'var(--red)';
  seen.textContent      = `last tick: ${timeSince(lastTickMs)}`;
}

// ── main parse + render ────────────────────────────────────────────────────
function processLog(text) {
  const lines = text.split('\n');

  // last tick
  const tickLines = lines.filter(l => l.includes(' tick ') && RE_TICK.test(l));
  if (tickLines.length > 0) {
    const last = tickLines[tickLines.length - 1];
    const m    = last.match(RE_TICK);
    const tsM  = last.match(RE_TS);
    if (m) {
      renderMetrics(
        parseFloat(m[2]),  // close
        parseFloat(m[3]),  // sma
        parseFloat(m[4]),  // rsi
        m[5],              // state
        m[1],              // symbol
      );

      // parse timestamp → Date for connection freshness
      if (tsM) {
        const ts = tsM[1].replace(',', '.');
        lastTickMs = new Date(ts).getTime();
        // update timeframe display
        const tfMatch = last.match(/timeframe=(\S+)/);
        el('tf-value').textContent = 'timeframe: ' + (tfMatch ? tfMatch[1] : '1m');
      }
    }
  }

  // buy signals
  const newSignals = [];
  lines.forEach(line => {
    if (!line.includes('buy_signal')) return;
    const m   = line.match(RE_SIGNAL);
    const tsM = line.match(RE_TS);
    if (m) newSignals.push({
      ts:    tsM ? tsM[1] : '',
      close: m[2],
      rsi:   m[3],
    });
  });
  if (newSignals.length !== signals.length) {
    signals = newSignals;
    renderSignals();
  }

  renderLog(lines);
  renderConnection();
}

// ── fetch loop ─────────────────────────────────────────────────────────────
async function poll() {
  try {
    const res  = await fetch(`${LOG_URL}?_=${Date.now()}`);
    const text = await res.text();
    processLog(text);
  } catch (err) {
    renderLog([`ERROR loading log: ${err.message}`]);
  }
  renderConnection();
}

// boot
poll();
setInterval(poll, POLL_MS);

// refresh connection indicator every second (for the "Xs ago" timer)
setInterval(renderConnection, 1000);
</script>
</body>
</html>
